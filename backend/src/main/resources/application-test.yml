ops:
  ai:
    database:
      url: ${OPS_AI_DB_URL:jdbc:postgresql://localhost:5432/hotelopai_test}
      username: ${OPS_AI_DB_USERNAME:hotelopai}
      password: ${OPS_AI_DB_PASSWORD:hotelopai}
      driver-class-name: ${OPS_AI_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
      maximum-pool-size: ${OPS_AI_DB_MAXIMUM_POOL_SIZE:4}
    unimock:
      base-url: ${OPS_AI_UNIMOCK_BASE_URL:http://localhost:8090}
    auth:
      jwt:
        secret: ${OPS_AI_AUTH_JWT_SECRET:hotel-opai-test-secret-hotel-opai-test-secret}
      seed:
        enabled: ${OPS_AI_AUTH_SEED_ENABLED:true}
