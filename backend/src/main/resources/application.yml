spring:
  application:
    name: hotel-opai
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: public
    schemas:
      - public
      - unimock

ops:
  ai:
    auth:
      jwt:
        issuer: hotel-opai
        access-token-ttl: PT15M
        refresh-token-ttl: P30D
      seed:
        enabled: false

assistant:
  ai:
    provider: ${ASSISTANT_AI_PROVIDER:deterministic}
    fallback-enabled: ${ASSISTANT_AI_FALLBACK_ENABLED:true}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:}
      request-timeout: ${OPENAI_REQUEST_TIMEOUT:PT20S}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:400}
      temperature: ${OPENAI_TEMPERATURE:0.0}
      retries: ${OPENAI_RETRIES:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
