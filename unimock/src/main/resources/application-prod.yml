ops:
  ai:
    unimock:
      database:
        url: ${OPS_AI_UNIMOCK_DB_URL}
        username: ${OPS_AI_UNIMOCK_DB_USERNAME}
        password: ${OPS_AI_UNIMOCK_DB_PASSWORD}
        driver-class-name: ${OPS_AI_UNIMOCK_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
        maximum-pool-size: ${OPS_AI_UNIMOCK_DB_MAXIMUM_POOL_SIZE:10}
