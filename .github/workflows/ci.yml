name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend and UniMock tests
        run: ./gradlew :backend:test :unimock:test

      - name: Upload backend test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/test-results/test/
            backend/build/reports/tests/test/
          if-no-files-found: warn

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Type-check mobile
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Run mobile tests
        working-directory: mobile
        run: npm test

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t hotel-opai-backend:ci .

      - name: Build UniMock Docker image
        run: docker build -f docker/unimock.Dockerfile -t hotel-opai-unimock:ci .

      - name: Start smoke stack
        run: docker compose -f docker/docker-compose.smoke.yml up -d postgres unimock backend

      - name: Run smoke tests
        run: scripts/smoke/api-smoke.sh

      - name: Stop smoke stack
        if: always()
        run: docker compose -f docker/docker-compose.smoke.yml down -v
