spring:
  application:
    name: hotel-opai
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: public
    schemas:
      - public
      - unimock

ops:
  ai:
    auth:
      jwt:
        issuer: hotel-opai
        access-token-ttl: PT15M
        refresh-token-ttl: P30D
      seed:
        enabled: false

logging:
  level:
    root: INFO
