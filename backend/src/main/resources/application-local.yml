ops:
  ai:
    database:
      url: ${OPS_AI_DB_URL:jdbc:postgresql://localhost:5432/hotelopai}
      username: ${OPS_AI_DB_USERNAME:hotelopai}
      password: ${OPS_AI_DB_PASSWORD:hotelopai}
      driver-class-name: ${OPS_AI_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
      maximum-pool-size: ${OPS_AI_DB_MAXIMUM_POOL_SIZE:10}
    unimock:
      base-url: ${OPS_AI_UNIMOCK_BASE_URL:http://localhost:8090}
    auth:
      jwt:
        secret: ${OPS_AI_AUTH_JWT_SECRET:hotel-opai-local-dev-secret-hotel-opai-local-dev-secret}
      seed:
        enabled: ${OPS_AI_AUTH_SEED_ENABLED:true}

assistant:
  ai:
    provider: ${ASSISTANT_AI_PROVIDER:deterministic}
    fallback-enabled: ${ASSISTANT_AI_FALLBACK_ENABLED:true}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:}
      request-timeout: ${OPENAI_REQUEST_TIMEOUT:PT20S}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:400}
      temperature: ${OPENAI_TEMPERATURE:0.0}
      retries: ${OPENAI_RETRIES:1}
