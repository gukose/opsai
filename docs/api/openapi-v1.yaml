        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          headers:
            X-API-Version:
              description: API version that handled the request.
              schema:
                type: string
                default: v1
          content:
            '*/*':
              schema:
