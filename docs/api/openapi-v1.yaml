components:
  schemas:
    AssignmentRequest:
      type: object
      properties:
        assigneeType:
          type: string
          enum:
          - TEAM
          - USER
        assigneeId:
          type: string
        displayName:
          type: string
      required:
      - assigneeId
      - assigneeType
      - displayName
    CreateTaskRequest:
      type: object
      properties:
        hotelId:
          type: string
        intentType:
          type: string
          enum:
          - GUEST_REQUEST
          - MAINTENANCE
          - HOUSEKEEPING
          - DAMAGE_REPORT
          - LOST_AND_FOUND
          - TRAY_REMOVAL
          - LAUNDRY
          - MINIBAR
          - FLASH_TASK
          - SHIFT_HANDOVER
          - PUBLIC_AREA
          - INVENTORY
          - DELIVERIES
        source:
          type: string
          enum:
          - ASSISTANT
          - MANUAL
          - MOBILE
          - API
          - IMPORT
        title:
          type: string
        description:
          type: string
        roomNumber:
          type:
          - string
          - "null"
        priority:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - URGENT
        slaDeadline:
          type: string
          format: date-time
        assignment:
          oneOf:
          - $ref: "#/components/schemas/AssignmentRequest"
          - type: "null"
      required:
      - description
      - hotelId
      - intentType
      - priority
      - slaDeadline
      - source
      - title
    TaskAssignmentResponse:
      type: object
      properties:
        assigneeType:
          type: string
        assigneeId:
          type: string
        displayName:
          type: string
        assignedAt:
          type: string
          format: date-time
      required:
      - assignedAt
      - assigneeId
      - assigneeType
      - displayName
    TaskResponse:
      type: object
      properties:
        id:
          type: string
        hotelId:
          type: string
        intentType:
          type: string
        source:
          type: string
        title:
          type: string
        description:
          type: string
        roomNumber:
          type:
          - string
          - "null"
        priority:
          type: string
        status:
          type: string
        slaDeadline:
          type: string
          format: date-time
        assignment:
          oneOf:
          - $ref: "#/components/schemas/TaskAssignmentResponse"
          - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type:
          - string
          - "null"
          format: date-time
        completedAt:
          type:
          - string
          - "null"
          format: date-time
        cancelledAt:
          type:
          - string
          - "null"
          format: date-time
        overdueAt:
          type:
          - string
          - "null"
          format: date-time
      required:
      - createdAt
      - description
      - hotelId
      - id
      - intentType
      - priority
      - slaDeadline
      - source
      - status
      - title
      - updatedAt
    AssignTaskRequest:
      type: object
      properties:
        assigneeType:
          type: string
          enum:
          - TEAM
          - USER
        assigneeId:
          type: string
        displayName:
          type: string
      required:
      - assigneeId
      - assigneeType
      - displayName
    NotificationRecipientResponse:
      type: object
      properties:
        type:
          type: string
        userId:
          type:
          - string
          - "null"
        roleCode:
          type:
          - string
          - "null"
      required:
      - type
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
        hotelId:
          type: string
        recipient:
          $ref: "#/components/schemas/NotificationRecipientResponse"
        type:
          type: string
        status:
          type: string
        title:
          type: string
        body:
          type: string
        sourceTaskId:
          type:
          - string
          - "null"
        readAt:
          type:
          - string
          - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - body
      - createdAt
      - hotelId
      - id
      - recipient
      - status
      - title
      - type
      - updatedAt
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceId:
          type:
          - string
          - "null"
        deviceName:
          type:
          - string
          - "null"
        ipAddress:
          type:
          - string
          - "null"
        userAgent:
          type:
          - string
          - "null"
      required:
      - refreshToken
    AuthSessionResponse:
      type: object
      properties:
        tokenType:
          type: string
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/CurrentUserResponse"
      required:
      - accessToken
      - accessTokenExpiresAt
      - refreshToken
      - refreshTokenExpiresAt
      - tokenType
      - user
    CurrentUserResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
        employeeId:
          type:
          - string
          - "null"
          format: uuid
        email:
          type: string
        displayName:
          type: string
        hotelName:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleResponse"
        permissions:
