ops:
  ai:
    database:
      url: ${OPS_AI_DB_URL}
      username: ${OPS_AI_DB_USERNAME}
      password: ${OPS_AI_DB_PASSWORD}
      driver-class-name: ${OPS_AI_DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
      maximum-pool-size: ${OPS_AI_DB_MAXIMUM_POOL_SIZE:20}
    unimock:
      base-url: ${OPS_AI_UNIMOCK_BASE_URL}
    auth:
      jwt:
        secret: ${OPS_AI_AUTH_JWT_SECRET}
      seed:
        enabled: false

assistant:
  ai:
    provider: ${ASSISTANT_AI_PROVIDER:}
    fallback-enabled: ${ASSISTANT_AI_FALLBACK_ENABLED:false}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:}
      request-timeout: ${OPENAI_REQUEST_TIMEOUT:PT20S}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:400}
      temperature: ${OPENAI_TEMPERATURE:0.0}
      retries: ${OPENAI_RETRIES:1}
